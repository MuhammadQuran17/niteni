stages:
  - review
  - publish

variables:
  NODE_IMAGE: node:20-alpine

# ============================================
# Niteni - AI Code Review on Merge Requests
# Uses Gemini CLI /code-review extension
# https://github.com/gemini-cli-extensions/code-review
# ============================================
niteni:
  stage: review
  image: $NODE_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - apk add --no-cache git curl bash
    # Install Gemini CLI (requires Node.js 18+)
    - npm install -g @google/gemini-cli || npm install -g gemini-cli || true
    # Install dependencies and build
    - npm ci
    - npm run build
  script:
    - echo "Niteni - reviewing MR !${CI_MERGE_REQUEST_IID}..."
    - node dist/cli.js --mode mr
  allow_failure: true
  variables:
    GEMINI_API_KEY: $GEMINI_API_KEY
    GITLAB_TOKEN: $GITLAB_TOKEN
    REVIEW_FAIL_ON_CRITICAL: "false"
    REVIEW_EXCLUDE_PATTERNS: "package-lock.json,yarn.lock,*.min.js,*.min.css,*.map"

# ============================================
# Publish NPM Package to GitLab Registry
# ============================================
publish-package:
  stage: publish
  image: $NODE_IMAGE
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  before_script:
    - npm ci
    - npm run build
    - |
      cat > .npmrc << EOF
      //\${CI_SERVER_HOST}/api/v4/projects/\${CI_PROJECT_ID}/packages/npm/:_authToken=\${CI_JOB_TOKEN}
      EOF
  script:
    - npm publish
